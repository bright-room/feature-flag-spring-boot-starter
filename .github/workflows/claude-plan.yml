name: Claude Implementation Plan

on:
  issues:
    types: [labeled]

jobs:
  create-plan:
    if: github.event.label.name == 'claude-plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create implementation plan
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: claude-plan
          claude_args: '--model claude-opus-4-6'
          prompt: |
            あなたはこのリポジトリの実装プランナーです。
            Issueの内容を注意深く読み、詳細な実装プランを作成してください。

            ## 手順

            1. コードベースを徹底的に調査し、現在のアーキテクチャ、既存のパターン、関連ファイルを把握する。
            2. Issueの要件を分析し、影響を受けるすべてのモジュールとファイルを特定する。
            3. コードベースの既存の規約に従った実装アプローチを設計する。

            ## 出力フォーマット

            以下の構造に従い、日本語でIssueコメントとしてプランを記述してください。

            ### 概要
            - Issueの要件を1-2文で要約

            ### 影響範囲
            - 変更が必要なモジュール・ファイルの一覧
            - 新規作成が必要なファイルの一覧

            ### 実装プラン

            フェーズ単位で実装ステップを整理してください。
            各フェーズは独立してレビュー・マージ可能な単位とし、フェーズ間の依存関係を明確にしてください。

            #### Phase 1: （フェーズのタイトル）
            **目的**: このフェーズで達成すること
            **変更対象ファイル**:
            - `path/to/File.java` — 変更内容の概要
            **ステップ**:
            1. 具体的な実装ステップ（クラス名、メソッド名を含む）
            2. ...

            #### Phase 2: （フェーズのタイトル）
            （同様の構造で記述）

            ### テスト方針
            - フェーズごとに追加・修正が必要なテストの一覧
            - テストの観点（正常系、異常系、境界値など）

            ### 注意事項
            - 既存のAPIとの後方互換性に関する考慮
            - パフォーマンスへの影響
            - その他の懸念点

            ## ルール

            - ブランチ、コミット、プルリクエストを作成しないこと。
            - リポジトリ内のファイルを変更しないこと。
            - コードベースの読み取りと分析のみを行うこと。
