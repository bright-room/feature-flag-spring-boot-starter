name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Extract model from the comment / issue body
      - name: Determine Claude Model
        id: determine-claude-model
        run: |
          # Get the comment/issue body based on event type
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            BODY=$(cat <<'EOF'
          ${{ github.event.comment.body }}
          EOF
          )
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            BODY=$(cat <<'EOF'
          ${{ github.event.comment.body }}
          EOF
          )
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            BODY=$(cat <<'EOF'
          ${{ github.event.review.body }}
          EOF
          )
          elif [ "${{ github.event_name }}" = "issues" ]; then
            BODY=$(cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF
          )
          fi
          
          # Convert to lowercase for case-insensitive matching
          BODY_LOWER=$(echo "$BODY" | tr '[:upper:]' '[:lower:]')

          # Determine model based on keywords
          if echo "$BODY_LOWER" | grep -q '\bopus\b'; then
            MODEL="claude-opus-4-6"
          elif echo "$BODY_LOWER" | grep -q '\bhaiku\b'; then
            MODEL="claude-haiku-4-5"
          else
            # Default to sonnet (including when 'sonnet' keyword is present)
            MODEL="claude-sonnet-4-6"
          fi

          echo "model=$MODEL" >> $GITHUB_OUTPUT
          echo "Selected model: $MODEL"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          claude_args: |
            --model ${{ steps.determine-claude-model.outputs.model }}
            --allowed-tools "Bash(gh issue create*)" "Bash(gh pr create*)" "Bash(./gradlew spotlessApply:*)" "Bash(./gradlew check:*)"
