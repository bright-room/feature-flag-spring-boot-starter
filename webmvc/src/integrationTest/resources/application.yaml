feature-flags:
  path-patterns:
    includes:
      - "/**"
  features:
    experimental-stage-endpoint:
      enabled: true
    development-stage-endpoint:
      enabled: false
    enable-class-level-feature:
      enabled: true
    disable-class-level-feature:
      enabled: false
    legacy-api:
      enabled: false
    special-endpoint:
      enabled: true
  response:
    type: json
